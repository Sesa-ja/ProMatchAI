<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="930" viewBox="0 0 1600 930" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4. Hybrid persistence and synchronization workflow</title>
  <desc id="desc">A decision-oriented flowchart showing how ProMatchAI writes to local cache, renders the interface, attempts backend synchronization, and handles success or failure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f718b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5e718a; }
      .boxTitle { font: 700 23px Arial, sans-serif; fill: #17324f; }
      .boxText { font: 400 18px Arial, sans-serif; fill: #35506d; }
      .note { font: 400 15px Arial, sans-serif; fill: #5e718a; }
    </style>
  </defs>
  <rect width="1600" height="930" fill="url(#bg)"/>
  <text x="800" y="58" text-anchor="middle" class="title">Figure 4. Hybrid Persistence and Synchronization Workflow</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">The application prioritizes local continuity, then attempts backend synchronization and merges results when available.</text>

  <rect x="120" y="360" width="250" height="110" rx="24" ry="24" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="245" y="412" text-anchor="middle" class="boxTitle">User Action</text>
  <text x="245" y="445" text-anchor="middle" class="boxText">Apply, edit, load, continue</text>

  <rect x="470" y="170" width="320" height="120" rx="24" ry="24" fill="#eef5ff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="630" y="222" text-anchor="middle" class="boxTitle">Write / Read Local Cache</text>
  <text x="630" y="257" text-anchor="middle" class="boxText">localStorage for jobs, users,</text>
  <text x="630" y="285" text-anchor="middle" class="boxText">courses, applications, shortlists</text>

  <rect x="470" y="540" width="320" height="120" rx="24" ry="24" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="630" y="592" text-anchor="middle" class="boxTitle">Attempt Backend Sync</text>
  <text x="630" y="627" text-anchor="middle" class="boxText">Call Supabase Edge Function</text>

  <rect x="900" y="170" width="320" height="120" rx="24" ry="24" fill="#f2fbf8" stroke="#b9e5da" stroke-width="3"/>
  <text x="1060" y="222" text-anchor="middle" class="boxTitle">Immediate UI Rendering</text>
  <text x="1060" y="257" text-anchor="middle" class="boxText">Show cached state quickly</text>

  <polygon points="1060,500 1210,610 1060,720 910,610" fill="#fff8ef" stroke="#f0d7a6" stroke-width="3"/>
  <text x="1060" y="588" text-anchor="middle" class="boxTitle">Backend</text>
  <text x="1060" y="618" text-anchor="middle" class="boxTitle">available?</text>

  <rect x="1310" y="470" width="210" height="110" rx="24" ry="24" fill="#effbf4" stroke="#bae4c9" stroke-width="3"/>
  <text x="1415" y="522" text-anchor="middle" class="boxTitle">Merge / Refresh</text>
  <text x="1415" y="555" text-anchor="middle" class="boxText">Update cached data</text>

  <rect x="1310" y="660" width="210" height="110" rx="24" ry="24" fill="#fff1f1" stroke="#eab6b6" stroke-width="3"/>
  <text x="1415" y="712" text-anchor="middle" class="boxTitle">Fallback</text>
  <text x="1415" y="745" text-anchor="middle" class="boxText">Keep local-only state</text>

  <rect x="900" y="800" width="320" height="90" rx="22" ry="22" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="1060" y="843" text-anchor="middle" class="boxTitle">Resilient User Experience</text>
  <text x="1060" y="873" text-anchor="middle" class="boxText">Continuity under partial connectivity</text>

  <line x1="370" y1="390" x2="470" y2="230" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="370" y1="440" x2="470" y2="600" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="790" y1="230" x2="900" y2="230" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="790" y1="600" x2="910" y2="610" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1060" y1="290" x2="1060" y2="500" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1210" y1="610" x2="1310" y2="525" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1060" y1="720" x2="1310" y2="715" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1415" y1="580" x2="1130" y2="800" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1415" y1="770" x2="1110" y2="800" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="1260" y="555" class="boxText">Yes</text>
  <text x="1185" y="748" class="boxText">No</text>

  <text x="800" y="905" text-anchor="middle" class="note">Source: Author-generated flowchart derived from cache-first patterns in jobs, courses, applications, notifications, and admin data loading.</text>
</svg>
