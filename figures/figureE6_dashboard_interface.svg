  <text x="190" y="372" class="white" style="font:400 19px Arial, sans-serif;">Your profile, applications, and learning progress are summarized here.</text>
  <rect x="1110" y="305" width="290" height="82" rx="24" ry="24" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
