<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure E6. Refugee dashboard interface overview</title>
  <desc id="desc">A polished interface visual summarizing the main dashboard layout with recommended jobs, application summaries, statistics, and learning continuation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7fb"/>
      <stop offset="100%" stop-color="#dbeaf6"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f5bd8"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #5d728c; }
      .h1 { font: 700 26px Arial, sans-serif; fill: #17324f; }
      .h2 { font: 700 20px Arial, sans-serif; fill: #17324f; }
      .body { font: 400 17px Arial, sans-serif; fill: #35516e; }
      .small { font: 400 14px Arial, sans-serif; fill: #6d8299; }
      .white { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #d7e5f1; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="800" y="56" text-anchor="middle" class="title">Figure E6. Refugee Dashboard Interface Overview</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">Illustrative visual based on the implemented dashboard, showing personalized progress, applications, and AI-assisted recommendations.</text>

  <rect x="100" y="130" width="1400" height="760" rx="34" ry="34" fill="#f8fcff" stroke="#cdddea" stroke-width="3"/>
