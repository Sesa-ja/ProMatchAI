<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 2. Layered application architecture of ProMatchAI</title>
  <desc id="desc">A layered architecture diagram showing the experience layer, state and orchestration layer, domain logic layer, and persistence and service layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f718b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5e718a; }
      .layerTitle { font: 700 26px Arial, sans-serif; fill: #17324f; }
      .layerText { font: 400 18px Arial, sans-serif; fill: #35506d; }
      .note { font: 400 15px Arial, sans-serif; fill: #5e718a; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="58" text-anchor="middle" class="title">Figure 2. Layered Application Architecture of ProMatchAI</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">The software is structured as a four-layer stack from interface delivery to hybrid persistence.</text>

  <rect x="180" y="150" width="1240" height="130" rx="28" ry="28" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="800" y="205" text-anchor="middle" class="layerTitle">Experience Layer</text>
  <text x="800" y="242" text-anchor="middle" class="layerText">Onboarding, Dashboard, Jobs, Learn, Profile, Notifications, Admin Panels, Dialogs, Forms</text>

  <rect x="240" y="330" width="1120" height="130" rx="28" ry="28" fill="#eef5ff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="800" y="385" text-anchor="middle" class="layerTitle">State and Orchestration Layer</text>
  <text x="800" y="422" text-anchor="middle" class="layerText">App.tsx, manual routing, active tab state, userProfile state, workflow transitions, screen control</text>

  <rect x="300" y="510" width="1000" height="150" rx="28" ry="28" fill="#f2fbf8" stroke="#b9e5da" stroke-width="3"/>
  <text x="800" y="565" text-anchor="middle" class="layerTitle">Domain Logic Layer</text>
  <text x="800" y="602" text-anchor="middle" class="layerText">Recommendations, AI matching explanations, translations, notifications, profile achievements, job visibility</text>
  <text x="800" y="636" text-anchor="middle" class="layerText">Shared rules reused across refugee-facing and admin-facing modules</text>

  <rect x="360" y="720" width="880" height="120" rx="28" ry="28" fill="#fff8ef" stroke="#f0d7a6" stroke-width="3"/>
  <text x="800" y="773" text-anchor="middle" class="layerTitle">Persistence and Service Layer</text>
  <text x="800" y="810" text-anchor="middle" class="layerText">localStorage, Supabase Edge Functions, Hono routes, Supabase KV table, cached sync operations</text>

  <line x1="800" y1="280" x2="800" y2="330" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="800" y1="460" x2="800" y2="510" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="800" y1="660" x2="800" y2="720" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>

  <line x1="310" y1="395" x2="420" y2="770" stroke="#8ca0bb" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="395" x2="1180" y2="770" stroke="#8ca0bb" stroke-width="3.5" marker-end="url(#arrow)"/>

  <text x="800" y="880" text-anchor="middle" class="note">Source: Author-generated layered view synthesized from App.tsx, shared utilities, and backend service definitions in the workspace.</text>
</svg>
