<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure E7. Jobs and matching interface overview</title>
  <desc id="desc">A visual overview of the jobs interface showing search, filters, AI match badges, and skill-alignment details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7fb"/>
      <stop offset="100%" stop-color="#dbeaf6"/>
    </linearGradient>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #5d728c; }
      .h1 { font: 700 24px Arial, sans-serif; fill: #17324f; }
      .h2 { font: 700 19px Arial, sans-serif; fill: #17324f; }
      .body { font: 400 17px Arial, sans-serif; fill: #35516e; }
      .small { font: 400 14px Arial, sans-serif; fill: #6d8299; }
    </style>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="800" y="56" text-anchor="middle" class="title">Figure E7. Jobs and Matching Interface Overview</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">Illustrative visual based on the implemented jobs tab, highlighting filters, AI-assisted scoring, and skill-gap guidance.</text>

