<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure E11. ProMatchAI backend route structure</title>
  <desc id="desc">A clean appendix diagram showing the major REST route groups implemented in the ProMatchAI backend and their functional organization.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f718b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5e718a; }
      .coreTitle { font: 700 30px Arial, sans-serif; fill: #ffffff; }
      .coreText { font: 400 18px Arial, sans-serif; fill: #eef6ff; }
      .boxTitle { font: 700 23px Arial, sans-serif; fill: #17324f; }
      .boxText { font: 400 15px Arial, sans-serif; fill: #35506d; }
      .note { font: 400 15px Arial, sans-serif; fill: #5e718a; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">Figure E11. ProMatchAI Backend Route Structure</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">The serverless API is organized into domain route groups for core data, recommendation services, shortlist operations, analytics, and health monitoring.</text>

  <rect x="560" y="135" width="480" height="125" rx="28" ry="28" fill="#2554d8"/>
  <text x="800" y="190" text-anchor="middle" class="coreTitle">Supabase Edge Function API</text>
  <text x="800" y="225" text-anchor="middle" class="coreText">Base prefix: /make-server-215f50be</text>

  <rect x="95" y="330" width="310" height="170" rx="24" ry="24" fill="#ffffff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="250" y="382" text-anchor="middle" class="boxTitle">User Routes</text>
  <text x="250" y="417" text-anchor="middle" class="boxText">/users</text>
  <text x="250" y="447" text-anchor="middle" class="boxText">GET, GET /:id, POST,</text>
  <text x="250" y="473" text-anchor="middle" class="boxText">PUT /:id, DELETE /:id</text>

  <rect x="445" y="330" width="310" height="170" rx="24" ry="24" fill="#f7fbff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="600" y="382" text-anchor="middle" class="boxTitle">Job Routes</text>
  <text x="600" y="417" text-anchor="middle" class="boxText">/jobs</text>
  <text x="600" y="447" text-anchor="middle" class="boxText">GET, GET /:id, POST,</text>
  <text x="600" y="473" text-anchor="middle" class="boxText">PUT /:id, DELETE /:id</text>

  <rect x="795" y="330" width="310" height="170" rx="24" ry="24" fill="#f7fdfa" stroke="#b9e5da" stroke-width="3"/>
  <text x="950" y="382" text-anchor="middle" class="boxTitle">Course Routes</text>
  <text x="950" y="417" text-anchor="middle" class="boxText">/courses</text>
  <text x="950" y="447" text-anchor="middle" class="boxText">GET, GET /:id, POST,</text>
  <text x="950" y="473" text-anchor="middle" class="boxText">PUT /:id, DELETE /:id</text>

  <rect x="1145" y="330" width="310" height="170" rx="24" ry="24" fill="#fffaf5" stroke="#f0d7a6" stroke-width="3"/>
  <text x="1300" y="382" text-anchor="middle" class="boxTitle">Application Routes</text>
  <text x="1300" y="417" text-anchor="middle" class="boxText">/applications</text>
  <text x="1300" y="447" text-anchor="middle" class="boxText">GET, POST, PUT /:id,</text>
  <text x="1300" y="473" text-anchor="middle" class="boxText">DELETE /:id</text>

  <rect x="95" y="595" width="355" height="195" rx="24" ry="24" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="272" y="648" text-anchor="middle" class="boxTitle">Recommendation Routes</text>
  <text x="272" y="683" text-anchor="middle" class="boxText">/recommendations/opportunities/</text>
  <text x="272" y="707" text-anchor="middle" class="boxText">:candidateId</text>
  <text x="272" y="735" text-anchor="middle" class="boxText">Candidate to opportunity ranking</text>
  <text x="272" y="765" text-anchor="middle" class="boxText">/recommendations/candidates/</text>
  <text x="272" y="789" text-anchor="middle" class="boxText">:opportunityId</text>

  <rect x="490" y="595" width="355" height="195" rx="24" ry="24" fill="#fbf8ff" stroke="#d5c8f6" stroke-width="3"/>
  <text x="667" y="648" text-anchor="middle" class="boxTitle">Shortlist Routes</text>
  <text x="667" y="683" text-anchor="middle" class="boxText">/shortlists/opportunity/:opportunityId</text>
  <text x="667" y="711" text-anchor="middle" class="boxText">Fetch shortlist records by opportunity</text>
  <text x="667" y="741" text-anchor="middle" class="boxText">/shortlists and /shortlists/:id</text>
  <text x="667" y="769" text-anchor="middle" class="boxText">POST, PUT, DELETE for</text>
  <text x="667" y="793" text-anchor="middle" class="boxText">administrative shortlist workflow</text>

  <rect x="885" y="595" width="250" height="195" rx="24" ry="24" fill="#f5fcf7" stroke="#bae4c9" stroke-width="3"/>
  <text x="1010" y="648" text-anchor="middle" class="boxTitle">Analytics</text>
  <text x="1010" y="688" text-anchor="middle" class="boxText">/analytics</text>
  <text x="1010" y="718" text-anchor="middle" class="boxText">Dashboard counts,</text>
  <text x="1010" y="744" text-anchor="middle" class="boxText">system summaries,</text>
  <text x="1010" y="770" text-anchor="middle" class="boxText">and administrative insights</text>

  <rect x="1175" y="595" width="250" height="195" rx="24" ry="24" fill="#fff7f7" stroke="#eab6b6" stroke-width="3"/>
  <text x="1300" y="648" text-anchor="middle" class="boxTitle">Health Check</text>
  <text x="1300" y="688" text-anchor="middle" class="boxText">/health</text>
  <text x="1300" y="718" text-anchor="middle" class="boxText">Service availability,</text>
  <text x="1300" y="744" text-anchor="middle" class="boxText">deployment verification,</text>
  <text x="1300" y="770" text-anchor="middle" class="boxText">and operational status</text>

  <line x1="800" y1="260" x2="250" y2="330" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="260" x2="600" y2="330" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="260" x2="950" y2="330" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <line x1="800" y1="260" x2="1300" y2="330" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>

  <line x1="250" y1="500" x2="272" y2="595" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="600" y1="500" x2="667" y2="595" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="950" y1="500" x2="1010" y2="595" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1300" y1="500" x2="1300" y2="595" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="800" y="945" text-anchor="middle" class="note">Source: Author-generated route map synthesized from src/supabase/functions/server/index.tsx and backend documentation in the current workspace.</text>
</svg>
