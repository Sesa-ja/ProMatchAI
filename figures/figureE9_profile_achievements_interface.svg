  <text x="340" y="285" class="white" style="font:400 18px Arial, sans-serif;">Skills, applications, achievements, and certificates</text>
  <rect x="1140" y="225" width="260" height="80" rx="22" ry="22" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
  <text x="1270" y="258" text-anchor="middle" class="white" style="font:700 18px Arial, sans-serif;">Download CV</text>
  <text x="1270" y="286" text-anchor="middle" class="white" style="font:400 15px Arial, sans-serif;">AI-enhanced export ready</text>

