  <rect x="180" y="482" width="110" height="34" rx="14" ry="14" fill="#eef5ff"/><text x="235" y="505" text-anchor="middle" class="small">React</text>
  <rect x="305" y="482" width="110" height="34" rx="14" ry="14" fill="#eef5ff"/><text x="360" y="505" text-anchor="middle" class="small">TypeScript</text>
  <rect x="430" y="482" width="110" height="34" rx="14" ry="14" fill="#eef5ff"/><text x="485" y="505" text-anchor="middle" class="small">Communication</text>
  <text x="180" y="560" class="body">Profile completeness, work preferences, learning history,</text>
  <text x="180" y="590" class="body">and contact information are maintained in this section.</text>

