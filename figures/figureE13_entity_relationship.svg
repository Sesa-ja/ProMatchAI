<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure E13. ProMatchAI entity relationship view</title>
  <desc id="desc">A cleaner conceptual entity relationship view showing the main data entities and relationships in ProMatchAI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f718b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5e718a; }
      .boxTitle { font: 700 24px Arial, sans-serif; fill: #17324f; }
      .field { font: 400 16px Arial, sans-serif; fill: #35506d; }
      .label { font: 700 15px Arial, sans-serif; fill: #5e718a; }
      .note { font: 400 15px Arial, sans-serif; fill: #5e718a; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">Figure E13. ProMatchAI Entity Relationship View</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">The conceptual model connects refugee profiles, employability opportunities, learning records, applications, and administrative shortlist actions.</text>

  <rect x="85" y="220" width="340" height="255" rx="24" ry="24" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="255" y="272" text-anchor="middle" class="boxTitle">UserProfile</text>
  <text x="120" y="320" class="field">id, name, contact details</text>
  <text x="120" y="352" class="field">skills, languages, interests</text>
  <text x="120" y="384" class="field">experience and education</text>
  <text x="120" y="416" class="field">achievements and badges</text>
  <text x="120" y="448" class="field">course progress and preferences</text>

  <rect x="630" y="150" width="340" height="285" rx="24" ry="24" fill="#f7fbff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="800" y="202" text-anchor="middle" class="boxTitle">Job / Opportunity</text>
  <text x="665" y="250" class="field">id, title, company, category</text>
  <text x="665" y="282" class="field">required and preferred skills</text>
  <text x="665" y="314" class="field">languages, location, work mode</text>
  <text x="665" y="346" class="field">experience threshold</text>
  <text x="665" y="378" class="field">description and status</text>

  <rect x="1175" y="220" width="340" height="255" rx="24" ry="24" fill="#f7fdfa" stroke="#b9e5da" stroke-width="3"/>
  <text x="1345" y="272" text-anchor="middle" class="boxTitle">Course</text>
  <text x="1210" y="320" class="field">id, title, description</text>
  <text x="1210" y="352" class="field">duration, materials, video</text>
  <text x="1210" y="384" class="field">offline availability</text>
  <text x="1210" y="416" class="field">certificate and progress state</text>
  <text x="1210" y="448" class="field">status metadata</text>

  <rect x="330" y="615" width="360" height="230" rx="24" ry="24" fill="#fffaf5" stroke="#f0d7a6" stroke-width="3"/>
  <text x="510" y="667" text-anchor="middle" class="boxTitle">Application</text>
  <text x="365" y="715" class="field">id, userId, jobId</text>
  <text x="365" y="747" class="field">introduction and timing</text>
  <text x="365" y="779" class="field">status and review history</text>
  <text x="365" y="811" class="field">candidate-opportunity link</text>

  <rect x="910" y="615" width="360" height="230" rx="24" ry="24" fill="#fbf8ff" stroke="#d5c8f6" stroke-width="3"/>
  <text x="1090" y="667" text-anchor="middle" class="boxTitle">ShortlistRecord</text>
  <text x="945" y="715" class="field">id, candidateId, opportunityId</text>
  <text x="945" y="747" class="field">shortlistedAt and status</text>
  <text x="945" y="779" class="field">invitation and scheduling data</text>
  <text x="945" y="811" class="field">administrative evaluation metadata</text>

  <line x1="425" y1="340" x2="630" y2="280" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <rect x="440" y="255" width="170" height="32" rx="14" ry="14" fill="#ffffff"/>
  <text x="525" y="276" text-anchor="middle" class="label">informs matching</text>

  <line x1="970" y1="285" x2="1175" y2="340" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <rect x="1010" y="240" width="205" height="32" rx="14" ry="14" fill="#ffffff"/>
  <text x="1112" y="261" text-anchor="middle" class="label">supports employability</text>

  <line x1="305" y1="475" x2="450" y2="615" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="305" y="530" width="90" height="30" rx="14" ry="14" fill="#ffffff"/>
  <text x="350" y="550" text-anchor="middle" class="label">submits</text>

  <line x1="740" y1="435" x2="585" y2="615" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="595" y="500" width="95" height="30" rx="14" ry="14" fill="#ffffff"/>
  <text x="642" y="520" text-anchor="middle" class="label">receives</text>

  <line x1="860" y1="435" x2="1010" y2="615" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="900" y="500" width="125" height="30" rx="14" ry="14" fill="#ffffff"/>
  <text x="962" y="520" text-anchor="middle" class="label">may generate</text>

  <line x1="425" y1="410" x2="910" y2="700" stroke="#b0bfd1" stroke-width="3.5" marker-end="url(#arrow)"/>
  <rect x="555" y="560" width="215" height="32" rx="14" ry="14" fill="#ffffff"/>
  <text x="662" y="581" text-anchor="middle" class="label">candidate may be shortlisted</text>

  <line x1="1265" y1="475" x2="1160" y2="615" stroke="#b0bfd1" stroke-width="3.5" marker-end="url(#arrow)"/>
  <rect x="1155" y="520" width="250" height="32" rx="14" ry="14" fill="#ffffff"/>
  <text x="1280" y="541" text-anchor="middle" class="label">course completion may strengthen profile</text>

  <text x="800" y="945" text-anchor="middle" class="note">Source: Author-generated conceptual ER view synthesized from App.tsx, admin types, and application workflow structures in the current workspace.</text>
</svg>
