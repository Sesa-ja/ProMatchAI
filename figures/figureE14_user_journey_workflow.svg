<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Figure E14. ProMatchAI refugee user journey workflow</title>
  <desc id="desc">A cleaned workflow diagram showing the refugee user journey from onboarding and profile completion through recommendations, learning, applications, and outcome tracking.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f718b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #18324f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #5e718a; }
      .boxTitle { font: 700 23px Arial, sans-serif; fill: #17324f; }
      .boxText { font: 400 16px Arial, sans-serif; fill: #35506d; }
      .decision { font: 700 22px Arial, sans-serif; fill: #17324f; }
      .label { font: 700 15px Arial, sans-serif; fill: #5e718a; }
      .note { font: 400 15px Arial, sans-serif; fill: #5e718a; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="800" y="58" text-anchor="middle" class="title">Figure E14. ProMatchAI Refugee User Journey Workflow</text>
  <text x="800" y="92" text-anchor="middle" class="subtitle">The user journey integrates onboarding, profile completion, AI-guided opportunities, learning participation, job application, and outcome tracking.</text>

  <rect x="70" y="300" width="170" height="92" rx="22" ry="22" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="155" y="357" text-anchor="middle" class="boxTitle">Start</text>

  <rect x="300" y="255" width="300" height="170" rx="24" ry="24" fill="#f7fbff" stroke="#bfd3ef" stroke-width="3"/>
  <text x="450" y="312" text-anchor="middle" class="boxTitle">Onboarding and Signup</text>
  <text x="450" y="350" text-anchor="middle" class="boxText">Language selection, profile entry,</text>
  <text x="450" y="378" text-anchor="middle" class="boxText">basic registration, and orientation</text>

  <rect x="665" y="255" width="300" height="170" rx="24" ry="24" fill="#f7fdfa" stroke="#b9e5da" stroke-width="3"/>
  <text x="815" y="312" text-anchor="middle" class="boxTitle">Skill Profiling</text>
  <text x="815" y="350" text-anchor="middle" class="boxText">Skills, languages, experience,</text>
  <text x="815" y="378" text-anchor="middle" class="boxText">interests, and work preferences</text>

  <polygon points="1080,250 1245,340 1080,430 915,340" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="1080" y="330" text-anchor="middle" class="decision">Profile</text>
  <text x="1080" y="360" text-anchor="middle" class="decision">complete?</text>

  <rect x="1310" y="200" width="230" height="120" rx="24" ry="24" fill="#fffaf5" stroke="#f0d7a6" stroke-width="3"/>
  <text x="1425" y="250" text-anchor="middle" class="boxTitle">Enter Main App</text>
  <text x="1425" y="286" text-anchor="middle" class="boxText">Dashboard and tabbed</text>
  <text x="1425" y="312" text-anchor="middle" class="boxText">navigation experience</text>

  <rect x="1310" y="390" width="230" height="120" rx="24" ry="24" fill="#fff7f7" stroke="#eab6b6" stroke-width="3"/>
  <text x="1425" y="440" text-anchor="middle" class="boxTitle">Refine Profile</text>
  <text x="1425" y="476" text-anchor="middle" class="boxText">Add missing skills, experience,</text>
  <text x="1425" y="502" text-anchor="middle" class="boxText">or preference information</text>

  <rect x="190" y="660" width="260" height="155" rx="24" ry="24" fill="#fbf8ff" stroke="#d5c8f6" stroke-width="3"/>
  <text x="320" y="713" text-anchor="middle" class="boxTitle">Recommendations</text>
  <text x="320" y="748" text-anchor="middle" class="boxText">Jobs, apprenticeships,</text>
  <text x="320" y="774" text-anchor="middle" class="boxText">and match explanations</text>

  <rect x="510" y="660" width="260" height="155" rx="24" ry="24" fill="#f5fcf7" stroke="#bae4c9" stroke-width="3"/>
  <text x="640" y="713" text-anchor="middle" class="boxTitle">Learning Pathway</text>
  <text x="640" y="748" text-anchor="middle" class="boxText">Courses, offline content,</text>
  <text x="640" y="774" text-anchor="middle" class="boxText">progress, and certificates</text>

  <rect x="830" y="660" width="260" height="155" rx="24" ry="24" fill="#ffffff" stroke="#cad9ea" stroke-width="3"/>
  <text x="960" y="713" text-anchor="middle" class="boxTitle">Applications</text>
  <text x="960" y="748" text-anchor="middle" class="boxText">Submit introductions,</text>
  <text x="960" y="774" text-anchor="middle" class="boxText">track status, and receive updates</text>

  <rect x="1150" y="660" width="260" height="155" rx="24" ry="24" fill="#eef8f5" stroke="#b8dfd3" stroke-width="3"/>
  <text x="1280" y="713" text-anchor="middle" class="boxTitle">Outcome</text>
  <text x="1280" y="748" text-anchor="middle" class="boxText">Shortlist, interview,</text>
  <text x="1280" y="774" text-anchor="middle" class="boxText">or employment progression</text>

  <line x1="240" y1="346" x2="300" y2="346" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="600" y1="340" x2="665" y2="340" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="965" y1="340" x2="915" y2="340" stroke="#5f718b" stroke-width="5" marker-end="url(#arrow)"/>

  <line x1="1245" y1="305" x2="1310" y2="260" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <rect x="1238" y="246" width="48" height="26" rx="12" ry="12" fill="#ffffff"/>
  <text x="1262" y="264" text-anchor="middle" class="label">Yes</text>

  <line x1="1245" y1="375" x2="1310" y2="430" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <rect x="1236" y="390" width="42" height="26" rx="12" ry="12" fill="#ffffff"/>
  <text x="1257" y="408" text-anchor="middle" class="label">No</text>

  <polyline points="1310,450 1080,450 1080,430" fill="none" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>

  <polyline points="1425,320 1425,600 320,600 320,660" fill="none" stroke="#8ca0bb" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="450" y1="737" x2="510" y2="737" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="737" x2="830" y2="737" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>
  <line x1="1090" y1="737" x2="1150" y2="737" stroke="#5f718b" stroke-width="4.5" marker-end="url(#arrow)"/>

  <text x="800" y="945" text-anchor="middle" class="note">Source: Author-generated workflow based on refugee-facing screens, recommendation logic, course progression, and application tracking implemented in the current workspace.</text>
</svg>
